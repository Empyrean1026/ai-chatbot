<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <h1 class="title">AI Chatbot</h1>
        <span id="conversation-title" class="conversation-title hidden"></span>
      </div>
      <div class="header-right">
        <button id="theme-btn" class="icon-btn" title="切换主题">
          <svg id="theme-icon" viewBox="0 0 24 24" width="18" height="18">
            <path id="theme-sun" fill="currentColor" d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            <path id="theme-moon" fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button id="clear-btn" class="clear-btn" title="清空聊天记录">清空对话</button>
      </div>
    </header>

    <main id="chat-box" class="chat-box">
      <div class="welcome">
        <div class="welcome-icon">&#x1f916;</div>
        <h2>有什么我可以帮你的？</h2>
        <p class="welcome-hint">输入问题开始对话，支持 Markdown 和代码高亮</p>
      </div>
    </main>

    <div id="loading-bar" class="loading-bar hidden">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
      <span>AI 思考中...</span>
    </div>

    <form id="chat-form" class="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          class="user-input"
          placeholder="输入问题，Enter 发送，Shift+Enter 换行"
          rows="1"
        ></textarea>
        <button type="submit" id="send-btn" class="send-btn" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </form>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
